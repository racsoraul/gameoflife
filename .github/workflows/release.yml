name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: gameoflife-darwin-arm64
          - os: macos-15-intel
            artifact: gameoflife-darwin-amd64
          - os: ubuntu-latest
            artifact: gameoflife-linux-amd64
          - os: windows-latest
            artifact: gameoflife-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2 sdl2_ttf

      - name: Install SDL2 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev

      # Windows: MSYS2 provides GCC for CGO. The build uses -tags static
      # which links against go-sdl2's bundled static libraries, so SDL2
      # packages are not needed — only the compiler.
      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          update: false
          install: mingw-w64-x86_64-gcc

      - name: Build (Unix)
        if: runner.os != 'Windows'
        env:
          CGO_ENABLED: "1"
        run: go build -o ${{ matrix.artifact }} ./

      # Static build produces a standalone .exe with no DLL dependencies.
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          CGO_ENABLED: "1"
        run: go build -tags static -ldflags "-s -w" -o ${{ matrix.artifact }} ./

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
